<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Highlighter</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="wrap">
    <!-- 기존 highlight UI 옆/아래에 추가 -->
    <input id="startDtInput" type="text" placeholder="예: 2025-11-06 14:30 혹은 14:30" style="width: 220px;">
    <button id="fillStartDtBtn">시간 채우기</button>
    <input id="endDtInput" type="text" placeholder="종료시간 예: 2025-11-06 18:00" style="width:220px;">
    <button id="fillEndDtBtn">종료시간 채우기</button>

    <input id="freeSlotDate" type="text" placeholder="YYYY-MM-DD (비우면 오늘/선택일)">
    <input id="freeSlotDuration" type="number" min="10" step="10" value="60" style="width:100px">
    <input id="freeSlotAfter" type="text" placeholder="우선 HH:mm (선택)">
    <button id="findFreeSlotBtn">빈 시간 자동 채우기</button>
    <div style="display:flex; gap:8px; margin-top:8px;">
      <button id="autoScanStartBtn">자동 스캔 시작</button>
      <button id="autoScanStopBtn" class="ghost">중지</button>
    </div>
    <div id="autoScanStatus" style="font-size:12px; opacity:.8; margin-top:6px;"></div>

    <ul id="freeSlotList" style="max-height:200px; overflow:auto; padding-left:16px;"></ul>


  </div>
  <script type="module" src="popup.js"></script>
</body>

</html>
